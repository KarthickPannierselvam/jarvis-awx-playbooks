---
# Oracle Account Unlock Playbook
# Runs on target host as the SSH credential user (sudo -u oracle internally).
# Variables (can be overridden via AWX Survey or extra_vars):
#   oracle_sid  — Oracle SID to connect to  (default: ALP611T)
#   username    — Oracle DB username to unlock (default: REMOTE_SCHEDULER_AGENT)

- name: Oracle Account Unlock
  hosts: all
  gather_facts: false

  vars:
    oracle_sid: "ALP611T"
    username: "REMOTE_SCHEDULER_AGENT"
    protected_accounts: "'SYS','SYSTEM','DBSNMP','SYSMAN','BSBDEPLOY','SKYVAULT_REC','SKYUTILS','SKY_SCANNER','CAPACITY'"

  tasks:

    # ── OBSERVE 1.1 — Does the account exist? ──────────────────────────────
    - name: "1.1 OBSERVE - Check account exists in dba_users"
      ansible.builtin.shell: |
        sudo su - oracle -c '. dbset {{ oracle_sid }}; echo "
          SET PAGESIZE 0 HEADING OFF FEEDBACK OFF VERIFY OFF TRIMSPOOL ON;
          SELECT username FROM dba_users WHERE username=UPPER('"'"'{{ username }}'"'"');
          EXIT;
        " | $ORACLE_HOME/bin/sqlplus -s / as sysdba'
      register: check_exists
      changed_when: false

    - name: "1.1 VALIDATE - Account must exist"
      ansible.builtin.fail:
        msg: "USER_NOT_FOUND — {{ username }} does not exist in dba_users on {{ oracle_sid }}"
      when: username not in check_exists.stdout

    # ── OBSERVE 1.2 — Is the account locked? ───────────────────────────────
    - name: "1.2 OBSERVE - Check account status"
      ansible.builtin.shell: |
        sudo su - oracle -c '. dbset {{ oracle_sid }}; echo "
          SET PAGESIZE 0 HEADING OFF FEEDBACK OFF VERIFY OFF TRIMSPOOL ON;
          SELECT account_status FROM dba_users WHERE username=UPPER('"'"'{{ username }}'"'"');
          EXIT;
        " | $ORACLE_HOME/bin/sqlplus -s / as sysdba'
      register: check_status
      changed_when: false

    - name: "1.2 VALIDATE - Account must be LOCKED (not already OPEN)"
      ansible.builtin.fail:
        msg: "ACCOUNT_NOT_LOCKED — {{ username }} status is '{{ check_status.stdout | trim }}'. No unlock required."
      when: "'LOCKED' not in check_status.stdout"

    # ── THINK 1.3 — Protected account check ────────────────────────────────
    - name: "1.3 THINK - Check account is not a protected system account"
      ansible.builtin.shell: |
        sudo su - oracle -c '. dbset {{ oracle_sid }}; echo "
          SET PAGESIZE 0 HEADING OFF FEEDBACK OFF VERIFY OFF TRIMSPOOL ON;
          SELECT COUNT(*) FROM dual
          WHERE UPPER('"'"'{{ username }}'"'"') IN ({{ protected_accounts }});
          EXIT;
        " | $ORACLE_HOME/bin/sqlplus -s / as sysdba'
      register: check_protected
      changed_when: false

    - name: "1.3 VALIDATE - Must not be a protected account"
      ansible.builtin.fail:
        msg: "PROTECTED_ACCOUNT — {{ username }} is a protected system/schema account. Self-service unlock blocked."
      when: "'1' in check_protected.stdout"

    # ── ACT 2.1 — Unlock the account ───────────────────────────────────────
    - name: "2.1 ACT - ALTER USER ACCOUNT UNLOCK"
      ansible.builtin.shell: |
        sudo su - oracle -c '. dbset {{ oracle_sid }}; echo "
          SET PAGESIZE 0 HEADING OFF FEEDBACK OFF VERIFY OFF;
          ALTER USER {{ username }} ACCOUNT UNLOCK;
          EXIT;
        " | $ORACLE_HOME/bin/sqlplus -s / as sysdba'
      register: unlock_result

    # ── VERIFY 3.1 — Confirm account is OPEN ───────────────────────────────
    - name: "3.1 VERIFY - Confirm account status is OPEN"
      ansible.builtin.shell: |
        sudo su - oracle -c '. dbset {{ oracle_sid }}; echo "
          SET PAGESIZE 0 HEADING OFF FEEDBACK OFF VERIFY OFF TRIMSPOOL ON;
          SELECT account_status FROM dba_users WHERE username=UPPER('"'"'{{ username }}'"'"');
          EXIT;
        " | $ORACLE_HOME/bin/sqlplus -s / as sysdba'
      register: verify_status
      changed_when: false

    - name: "3.1 VALIDATE - Account must now be OPEN"
      ansible.builtin.fail:
        msg: "POST_VERIFY_FAILED — {{ username }} status is '{{ verify_status.stdout | trim }}' after unlock. Escalate to DBA."
      when: "'OPEN' not in verify_status.stdout"

    - name: "SUCCESS - Account is now OPEN"
      ansible.builtin.debug:
        msg: "{{ username }} on {{ oracle_sid }} is now OPEN. Unlock successful."
